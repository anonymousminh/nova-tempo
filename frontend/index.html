<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Tempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Nova Tempo</h1>
        <p class="subtitle">Calendar Assistant</p>

        <div id="chat-log"></div>

        <form id="chat-form">
            <input id="chat-input" type="text" placeholder="Ask about your schedule…" autocomplete="off" />
            <button type="submit">Send</button>
        </form>

        <p class="hint">Or run <code>python bidi_agent_run.py</code> for voice mode.</p>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
